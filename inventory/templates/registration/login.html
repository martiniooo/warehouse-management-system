<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <title>Logowanie</title>
  <style>
    :root{
      --bg: linear-gradient(135deg, #eef2f7, #f8f9fb);
      --card:#fff; --text:#2e2e2e; --muted:#6c757d;
      --accent:#0d6efd; --accent2:#0b5ed7;
      --border:#e5e7eb;
      --error-bg:#f8d7da;
    }
    *{box-sizing:border-box}
    body{
      margin:0; padding:30px; font-family:"Segoe UI", Arial, sans-serif;
      background:var(--bg); color:var(--text);
      min-height:100vh; display:flex; align-items:center; justify-content:center;
    }
    .card{
      width:420px; background:var(--card); border-radius:18px; padding:26px;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
      border:1px solid rgba(0,0,0,0.03);
    }
    h1{margin:0 0 10px 0}
    p{margin:0 0 18px 0; color:var(--muted); font-size:13px}
    label{display:block; font-weight:600; margin-top:14px; font-size:14px}
    input{
      width:100%; padding:10px 12px; margin-top:6px;
      border-radius:10px; border:1px solid #ccc; font-size:14px;
    }
    input:focus{outline:none; border-color:var(--accent)}
    button{
      width:100%; margin-top:18px; padding:12px; border:none;
      border-radius:12px; background:var(--accent); color:#fff;
      font-weight:700; cursor:pointer; font-size:15px;
    }
    button:hover{background:var(--accent2)}
    .error{
      background: var(--error-bg);
      padding: 10px 12px;
      border-radius: 12px;
      margin-top: 10px;
      color:#842029;
      font-size:14px;
    }
    .footer{
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
    }
    .footer a{
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }
    .footer a:hover{
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>🔐 Logowanie</h1>
    <p>Zaloguj się, aby uzyskać dostęp do systemu magazynowego.</p>

    {% if form.errors %}
      <div class="error">Niepoprawny login lub hasło.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      {# Django przekazuje "next" w querystring, ale utrwalamy go też w formularzu #}
      {% if next %}
        <input type="hidden" name="next" value="{{ next }}">
      {% endif %}

      <label>Nazwa użytkownika</label>
      <input type="text" name="username" autocomplete="username" required>

      <label>Hasło</label>
      <input type="password" name="password" autocomplete="current-password" required>

      <button type="submit">Zaloguj</button>
    </form>

    <div class="footer">
      Nie masz konta? <a href="{% url 'register' %}">Zarejestruj się</a>
    </div>
  </div>
</body>
</html>
