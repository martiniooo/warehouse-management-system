<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Produkty</title>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #eef2f7, #f8f9fb);
            --card-bg: #ffffff;
            --text: #2e2e2e;
            --muted: #6c757d;
            --accent: #0d6efd;
            --accent-hover: #0b5ed7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 30px;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            margin-bottom: 10px;
        }

        /* ===== ACTIONS ===== */

        .actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 22px;
        }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 16px;
            border-radius: 12px;
            background-color: var(--accent);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease;
        }

        .add-btn:hover {
            background-color: var(--accent-hover);
        }

        /* ===== SIATKA PRODUKTÓW ===== */

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(0,0,0,0.1);
        }

        .product-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .product-qty {
            font-size: 14px;
            color: var(--muted);
        }

        .qty-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 12px;
            border-radius: 20px;
            background-color: var(--accent);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
        }

        .empty {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        }
    </style>
</head>

<body>

{% include 'inventory/back_home.html' %}

<div class="container">

    <h1>📦 Lista produktów</h1>

    <!-- PRZYCISK DODAWANIA PRODUKTU -->

    {% if products %}
    <div class="grid">
        {% for product in products %}
        <div class="product-card">
            <div class="product-name">{{ product.name }}</div>
            <div class="product-qty">Stan magazynowy</div>
            <div class="qty-badge">{{ product.total_quantity }} szt.</div>
        </div>
        {% endfor %}
    </div>
    {% else %}
        <div class="empty">
            Brak produktów w magazynie.
        </div>
    {% endif %}

</div>

</body>
</html>
